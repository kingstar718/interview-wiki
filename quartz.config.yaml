# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: Interview Wiki
  pageTitleSuffix: " · 后端工程师面大厂"
  enableSPA: true
  enablePopovers: true
  analytics: null
  locale: zh-CN
  baseUrl: wiki.wujinxing.site
  ignorePatterns:
    - private
    - templates
    - .obsidian
  theme:
    # 不请求 Google Fonts(国内访问不通),正文/标题走系统字体栈
    fontOrigin: local
    cdnCaching: false
    typography:
      # 自托管变量字体(黑体方案,宋体屏显笔画细、长文阅读吃力)
      # Noto Sans Variable           — 拉丁字母/数字
      # Noto Sans SC Variable        — 简体中文
      # Noto Sans Mono Variable      — 代码等宽
      header: "Noto Sans Variable, Noto Sans SC Variable, PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, sans-serif"
      body: "Noto Sans Variable, Noto Sans SC Variable, PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, sans-serif"
      code: "Noto Sans Mono Variable, ui-monospace, Cascadia Code, Cascadia Mono, SFMono-Regular, SF Mono, Menlo, monospace"
    colors:
      # 沿用 docsify 时期的绿色视觉基调(#42b983)
      lightMode:
        light: "#ffffff"
        lightgray: "#e5e5e5"
        gray: "#9e9e9e"
        darkgray: "#333333" # 正文色,#4e4e4e 中文偏淡
        dark: "#1f1f1f"
        secondary: "#2c8f66"
        tertiary: "#42b983"
        highlight: rgba(66, 185, 131, 0.12)
        textHighlight: "#fff23688"
      darkMode:
        light: "#1a1b1e"
        lightgray: "#30363d"
        gray: "#6e7681"
        darkgray: "#c9d1d9"
        dark: "#e6edf3"
        secondary: "#42b983"
        tertiary: "#7ee2b8"
        highlight: rgba(66, 185, 131, 0.15)
        textHighlight: "#b3aa0288"
plugins:
  # ---------- transformers ----------
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  # [[双链]]、callout、高亮块等 Obsidian 语法
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
      display: desktop-only
  # shortest:按文件名解析链接(Obsidian 同款),纯文件名链接全库唯一匹配
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/fonts
    enabled: true
    options:
      fontOrigin: local
      # 插件会把该值原样写进 h1-h6 的 font-family,须给完整栈(拉丁优先用 Noto Sans)
      header: "Noto Sans Variable, Noto Sans SC Variable, PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, sans-serif"
      body: "Noto Sans Variable, Noto Sans SC Variable, PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, sans-serif"
      code: Noto Sans Mono Variable
  # ---------- filters ----------
  - source: github:quartz-community/remove-draft
    enabled: true
  # ---------- emitters ----------
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: false
  # 自定义域名:构建时把 CNAME 写入 public/
  - source: github:quartz-community/cname
    enabled: true
    options:
      domain: wiki.wujinxing.site
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  # ---------- 左栏 ----------
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  # Explorer 的 sortFn(分类顺序表)在 quartz.ts 里覆盖,YAML 放不下函数
  - source: github:quartz-community/explorer
    enabled: true
    layout:
      position: left
      priority: 50
  # ---------- 右栏 ----------
  # 注:该源无 tag、loader 只支持 --branch(不支持 commit pin),故无法锁版本。
  # 图谱中文节点 URL 编码的修复靠 build 里的 patch-graph-plugin.sh 保证(见 package.json)。
  - source: github:quartz-community/graph
    enabled: true
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 50
  # ---------- 正文区 ----------
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/tag-list
    enabled: true
    layout:
      position: beforeBody
      priority: 30
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        GitHub: https://github.com/kingstar718/interview-wiki
